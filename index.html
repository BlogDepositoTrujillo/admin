<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador Bingo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.panel{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
text-align:center;
}

.controles{
display:flex;
gap:10px;
margin-bottom:20px;
}

select,input{
padding:15px;
font-size:22px;
border:1px solid #ccc;
border-radius:8px;
}

select{
width:120px;
}

input{
flex:1;
}

.numero{
font-size:120px;
text-align:center;
font-weight:bold;
color:#d32f2f;
margin:20px 0;
}

.botones{
display:flex;
gap:10px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
color:white;
}

.preview{
background:#1976d2;
}

.revelar{
background:#2e7d32;
}

.historial{
margin-top:30px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.bola{
padding:12px 18px;
background:#ff9800;
color:white;
border-radius:30px;
font-weight:bold;
}

@media(max-width:768px){

.controles{
flex-direction:column;
}

.numero{
font-size:70px;
}

}
</style>

</head>
<body>

<div class="container">

<div class="panel">

<h1>🔒 Vista del Operador</h1>

<div class="controles">

<select id="letra">
<option>B</option>
<option>I</option>
<option>N</option>
<option>G</option>
<option>O</option>
</select>

<input
type="number"
id="numero"
min="1"
max="75"
placeholder="Número">

</div>

<div id="preview" class="numero">
--
</div>

<div class="botones">

<button
class="preview"
onclick="previsualizar()">
👁️ Previsualizar
</button>

<button
class="revelar"
onclick="revelar()">
📢 Revelar
</button>

</div>

<h2 style="margin-top:30px;">
Historial
</h2>

<div
id="historial"
class="historial">
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
push,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBn5NKTqkMfKiArerG5LgytLa4h67hjfog",
authDomain: "bingo-d817b.firebaseapp.com",
databaseURL: "https://bingo-d817b-default-rtdb.firebaseio.com",
projectId: "bingo-d817b",
storageBucket: "bingo-d817b.firebasestorage.app",
messagingSenderId: "763915768353",
appId: "1:763915768353:web:311d4124789acd14614960"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let pendiente = null;

window.previsualizar = function(){

let letra =
document.getElementById("letra").value;

let numero =
document.getElementById("numero").value;

if(numero==""){
alert("Ingrese un número");
return;
}

pendiente =
letra + "-" +
numero.padStart(2,"0");

document.getElementById("preview")
.innerHTML = pendiente;

}

window.revelar = async function(){

if(!pendiente){
alert("Previsualice primero");
return;
}

try{

await set(
ref(db,"bingo/ultimoNumero"),
pendiente
);

await push(
ref(db,"bingo/historial"),
{
numero: pendiente,
fecha: Date.now()
}
);

document.getElementById("preview")
.innerHTML = "--";

document.getElementById("numero")
.value = "";

pendiente = null;

cargarHistorial();

}catch(error){

console.error(error);

alert(
"Error al enviar información a Firebase"
);

}

}

async function cargarHistorial(){

try{

const snapshot =
await get(
ref(db,"bingo/historial")
);

let html = "";

if(snapshot.exists()){

const datos =
snapshot.val();

Object.values(datos)
.reverse()
.forEach(item=>{

html += `
<div class="bola">
${item.numero}
</div>
`;

});

}

document.getElementById("historial")
.innerHTML = html;

}catch(error){

console.error(error);

}

}

cargarHistorial();

</script>

</body>
</html>
